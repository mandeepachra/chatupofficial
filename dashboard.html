<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Dashboard</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #050508;
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.3);
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- HEADER --- */
        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px;
        }
        .logo { font-size: 1rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-search {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; display: flex; align-items: center; padding: 6px 12px;
        }
        .header-search input { width: 100%; background: transparent; border: none; outline: none; color: white; font-size: 0.8rem; }
        .header-search svg { width: 14px; color: rgba(255,255,255,0.3); margin-right: 8px; }

        /* Profile Button In Header */
        .profile-btn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--primary); overflow: hidden; cursor: pointer; box-shadow: var(--neon-glow); position: relative; z-index: 101; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* --- PROFILE TAB (AS DESIGNED) --- */
        #profile-tab {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        #profile-tab.show { right: 0; }
        
        .back-btn { align-self: flex-start; font-size: 28px; cursor: pointer; padding: 10px; color: var(--primary); }
        
        .p-card {
            width: 100%; max-width: 380px; background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px;
            padding: 40px 25px; text-align: center; margin-top: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .p-img-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .p-img-container img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; box-shadow: var(--neon-glow); }
        .edit-badge { position: absolute; bottom: 5px; right: 5px; background: var(--primary); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; border: 3px solid var(--bg-dark); cursor: pointer; }

        .info-group { text-align: left; margin-top: 25px; }
        .info-label { font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { font-size: 16px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 18px; display: block; }

        /* --- STORIES --- */
        .stories-box { display: flex; gap: 15px; padding: 20px 15px; overflow-x: auto; scrollbar-width: none; }
        .story { display: flex; flex-direction: column; align-items: center; min-width: 65px; }
        .story-ring { width: 64px; height: 64px; border-radius: 50%; padding: 2.5px; background: linear-gradient(45deg, var(--primary), var(--secondary)); position: relative; margin-bottom: 6px; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg-dark); background: #111; overflow: hidden; }
        .story-img img { width: 100%; height: 100%; object-fit: cover; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 15px 10px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: 0.3s; }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-item.active { color: var(--primary); transform: scale(1.2) translateY(-5px); filter: drop-shadow(0 0 8px var(--primary)); }
    </style>
</head>
<body>

    <header>
        <div class="logo">CHATUP</div>
        <div class="header-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" placeholder="Search friends...">
        </div>
        <div class="profile-btn" onclick="toggleProfile()">
            <img id="header-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        </div>
    </header>

    <div class="stories-box">
        <div class="story">
            <div class="story-ring">
                <div class="story-img"><img id="story-my-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"></div>
            </div>
            <span>Your Story</span>
        </div>
    </div>

    <div id="empty-chat" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 40vh; opacity: 0.5;">
        <div style="font-size: 3rem;">✉️</div>
        <p>Chat now with your friends</p>
    </div>

    <div id="profile-tab">
        <div class="back-btn" onclick="toggleProfile()">←</div>
        <div class="p-card">
            <div class="p-img-container">
                <img id="p-tab-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <label for="file-upload" class="edit-badge">📷</label>
                <input type="file" id="file-upload" style="display:none;" onchange="uploadImage(event)">
            </div>
            <h2 id="p-display-name">...</h2>
            <p id="p-display-username" style="color: var(--primary); font-size: 0.9rem; margin-bottom: 20px;">@...</p>
            
            <div class="info-group">
                <div class="info-label">Full Name</div>
                <span class="info-value" id="p-full-name">...</span>
                <div class="info-label">Email Address</div>
                <span class="info-value" id="p-email">...</span>
                <div class="info-label">Phone Number</div>
                <span class="info-value" id="p-mobile">...</span>
            </div>
            
            <button onclick="logoutUser()" style="width:100%; padding:14px; border:1px solid #ff4b2b; color:#ff4b2b; background:rgba(255,75,43,0.05); border-radius:18px; margin-top:10px; cursor:pointer; font-weight:800;">LOGOUT</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item" onclick="location.href='search.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
        <div class="nav-item" onclick="location.href='notifications.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></div>
        <div class="nav-item" onclick="location.href='settings.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const profileTab = document.getElementById('profile-tab');

        // Force function to be global
        window.toggleProfile = function() {
            profileTab.classList.toggle('show');
            console.log("Profile Toggled"); // For debugging
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('p-display-name').innerText = d.publicName || "User";
                    document.getElementById('p-display-username').innerText = "@" + (d.username || "username");
                    document.getElementById('p-full-name').innerText = d.publicName || "---";
                    document.getElementById('p-email').innerText = d.email || user.email;
                    document.getElementById('p-mobile').innerText = d.mobile || "Not Linked";
                    
                    const pUrl = d.profilePic || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                    document.getElementById('header-img').src = pUrl;
                    document.getElementById('p-tab-img').src = pUrl;
                    document.getElementById('story-my-img').src = pUrl;
                }
            } else { window.location.href = 'login.html'; }
        });

        window.uploadImage = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const cloudName = 'dic23ryy7';
            const preset = 'CHATUP_PRESET'; // Make sure this is 'Unsigned' in Cloudinary
            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', preset);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                if(data.secure_url) {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { profilePic: data.secure_url });
                    location.reload();
                }
            } catch (err) { alert("Photo upload failed!"); }
        };

        window.logoutUser = () => signOut(auth).then(() => location.href = 'login.html');
    </script>
</body>
</html>
