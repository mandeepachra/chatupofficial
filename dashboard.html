<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Dashboard</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #050508;
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.3);
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- SMART LOADER (FIXED) --- */
        #dash-loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #050508; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 99999; 
            transition: 0.5s ease;
        }
        .loader-content { position: relative; width: 140px; height: 140px; display: flex; justify-content: center; align-items: center; }
        .premium-ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255, 255, 255, 0.05); border-top: 2px solid var(--primary); border-radius: 50%; animation: rotate-ring 0.8s linear infinite; }
        .loader-text { display: flex; gap: 4px; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; color: white; }
        .loader-text span { opacity: 0; transform: translateY(10px); animation: letter-in 0.4s forwards; }
        @keyframes rotate-ring { 100% { transform: rotate(360deg); } }
        @keyframes letter-in { to { opacity: 1; transform: translateY(0); filter: drop-shadow(0 0 10px var(--primary)); } }

        #main-content { opacity: 0; transition: 1s ease; }

        /* --- HEADER --- */
        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.1rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container { flex: 0 1 180px; position: relative; display: flex; align-items: center; }
        .search-bar { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 6px 10px 6px 30px; color: white; font-size: 0.75rem; outline: none; }
        .search-icon { position: absolute; left: 10px; width: 12px; height: 12px; color: rgba(255,255,255,0.4); }

        .profile-btn { width: 36px; height: 36px; border-radius: 50%; background: #222; border: 1px solid var(--primary); overflow: hidden; cursor: pointer; box-shadow: var(--neon-glow); }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* --- PROFILE MODAL --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .profile-card { background: rgba(20, 20, 25, 0.95); border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 350px; margin: 80px auto; padding: 25px; border-radius: 28px; text-align: center; position: relative; }
        #modal-profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; cursor: pointer; }
        .cam-badge { position: absolute; top: 95px; right: 135px; background: var(--primary); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #000; }

        .details-list { text-align: left; margin-top: 20px; }
        .detail-row { margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .detail-row label { font-size: 9px; color: var(--primary); text-transform: uppercase; font-weight: 800; display: block; }
        .detail-row span { font-size: 14px; color: #fff; }

        /* --- NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 15px 10px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: 0.4s; }
        .nav-item.active { color: var(--primary); transform: scale(1.2); filter: drop-shadow(0 0 8px var(--primary)); }
        
        /* STORIES (RESTORED) */
        .stories-wrapper { padding: 15px 20px; display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .story-ring { width: 64px; height: 64px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, var(--primary), var(--secondary)); position: relative; }
        .user-keep { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--bg-dark); overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; }
        .user-keep img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="dash-loader">
        <div class="loader-content">
            <div class="premium-ring"></div>
            <div id="loaderText" class="loader-text"></div>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="logo">CHATUP</div>
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="search-bar" placeholder="Search friends...">
            </div>
            <div class="profile-btn" onclick="openModal()">
                <img id="header-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            </div>
        </header>

        <div class="stories-wrapper">
            <div class="story-card">
                <div class="story-ring">
                    <div class="user-keep"><img id="story-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"></div>
                    <div class="add-icon">+</div>
                </div>
                <span style="font-size: 0.65rem; color: rgba(255,255,255,0.6); text-align: center; display: block; margin-top: 5px;">My Story</span>
            </div>
        </div>

        <div id="empty-state" style="text-align: center; margin-top: 50px;">
            <div style="font-size: 3rem;">✉️</div>
            <h2 id="welcome-msg">Loading...</h2>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">🔍</div>
            <div class="nav-item">🔔</div>
            <div class="nav-item">⚙️</div>
        </nav>
    </div>

    <div id="profile-modal" class="modal" onclick="closeModal()">
        <div class="profile-card" onclick="event.stopPropagation()">
            <label for="p-input">
                <img id="modal-profile-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <div class="cam-badge">📷</div>
            </label>
            <input type="file" id="p-input" style="display:none;" onchange="uploadPhoto(event)">
            
            <h2 id="d-name">...</h2>
            <div class="details-list">
                <div class="detail-row"><label>Email</label><span id="d-email">...</span></div>
                <div class="detail-row"><label>Mobile</label><span id="d-mobile">...</span></div>
            </div>
            <button onclick="logout()" style="width:100%; padding:12px; background:rgba(255,75,43,0.1); border:1px solid #ff4b2b; color:#ff4b2b; border-radius:15px; margin-top:15px; cursor:pointer; font-weight:700;">Logout</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- LOADER LOGIC ---
        const loader = document.getElementById('dash-loader');
        const content = document.getElementById('main-content');
        const textContainer = document.getElementById('loaderText');
        "CHATUP".split('').forEach((l, i) => {
            const s = document.createElement('span'); s.innerText = l; s.style.animationDelay = `${i * 0.1}s`; textContainer.appendChild(s);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('welcome-msg').innerText = "Namaste, " + d.publicName;
                    document.getElementById('d-name').innerText = d.publicName;
                    document.getElementById('d-email').innerText = d.email;
                    document.getElementById('d-mobile').innerText = d.mobile;
                    if(d.profilePic) {
                        document.getElementById('header-img').src = d.profilePic;
                        document.getElementById('modal-profile-pic').src = d.profilePic;
                        document.getElementById('story-img').src = d.profilePic;
                    }
                }
                // HIDE LOADER
                setTimeout(() => { loader.style.opacity = '0'; content.style.opacity = '1'; setTimeout(() => loader.style.display='none', 500); }, 1500);
            } else { window.location.href = 'login.html'; }
        });

        // --- CLOUDINARY UPLOAD ---
        window.uploadPhoto = async (e) => {
            const file = e.target.files[0];
            const cloudName = 'dic23ryy7';
            const preset = 'TERA_PRESET_NAME'; // <--- Yahan apna preset dalo

            const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', preset);
            
            try {
                alert("Updating...");
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                if(data.secure_url) {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { profilePic: data.secure_url });
                    location.reload();
                }
            } catch (err) { alert("Fail!"); }
        };

        window.openModal = () => document.getElementById('profile-modal').style.display = 'block';
        window.closeModal = () => document.getElementById('profile-modal').style.display = 'none';
        window.logout = () => signOut(auth).then(() => location.href = 'login.html');
    </script>
</body>
</html>
