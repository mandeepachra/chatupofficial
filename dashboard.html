<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Dashboard</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #050508;
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.3);
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white; overflow-x: hidden; min-height: 100vh;
            padding-bottom: 120px; /* Footer aur Nav ke liye space */
        }

        /* --- HEADER --- */
        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.3rem; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .profile-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--primary);
            display: flex; justify-content: center; align-items: center; 
            box-shadow: var(--neon-glow); cursor: pointer;
        }

        /* --- STORIES --- */
        .stories-wrapper { padding: 15px; display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .story-ring {
            width: 65px; height: 65px; border-radius: 50%; padding: 3px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
        }
        .user-keep {
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg-dark);
            background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center;
        }

        /* --- DYNAMIC MIDDLE CONTENT --- */
        #middle-container {
            height: 40vh; display: flex; justify-content: center; align-items: center;
            text-align: center; overflow: hidden;
        }

        /* No Friends State */
        .empty-chat { display: flex; flex-direction: column; align-items: center; opacity: 0.7; }
        .empty-icon { font-size: 3rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--primary)); }

        /* Friends Slide State */
        .friends-slider { display: none; width: 100%; }
        .slide-text {
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite, slideIn 1s ease-out;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- FOOTER --- */
        footer {
            margin-top: 20px; text-align: center; padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }
        .footer-text {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 3px;
            color: rgba(255,255,255,0.2); text-transform: uppercase;
        }

        /* --- NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px); display: flex; justify-content: space-around; 
            padding: 12px 10px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item { color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: scale(1.1) translateY(-5px); filter: drop-shadow(0 0 8px var(--primary)); }
        .nav-item svg { width: 24px; height: 24px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CHATUP</div>
        <div class="profile-btn" onclick="location.href='profile.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
    </header>

    <div class="stories-wrapper">
        <div class="story-ring"><div class="user-keep"><svg width="24" height="24" viewBox="0 0 24 24" fill="white" opacity="0.3"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div></div>
    </div>

    <div id="middle-container">
        <div id="no-friends" class="empty-chat">
            <div class="empty-icon">💬</div>
            <p>No messages yet</p>
        </div>

        <div id="has-friends" class="friends-slider">
            <h1 class="slide-text">CHAT UP WITH YOUR FRIENDS</h1>
        </div>
    </div>

    <footer>
        <p class="footer-text">CHAT UP WITH YOUR FRIENDS</p>
    </footer>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item" onclick="location.href='search.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
        <div class="nav-item" onclick="location.href='notifications.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></div>
        <div class="nav-item" onclick="location.href='settings.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></div>
    </nav>

    <script>
        // Real logic ke liye: Yahan check karega kitne friends hain
        let friendsCount = 5; // Is value ko 0 karoge to "No messages" aayega

        function updateUI() {
            const noFriendsDiv = document.getElementById('no-friends');
            const hasFriendsDiv = document.getElementById('has-friends');

            if (friendsCount > 0) {
                noFriendsDiv.style.display = 'none';
                hasFriendsDiv.style.display = 'block';
            } else {
                noFriendsDiv.style.display = 'flex';
                hasFriendsDiv.style.display = 'none';
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
