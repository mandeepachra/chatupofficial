<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Dashboard</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- Header --- */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(5,5,8,0.8); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); cursor: pointer; object-fit: cover; }

        /* --- Content Area --- */
        .main-content { padding: 20px; padding-bottom: 100px; }
        .welcome-msg { margin-bottom: 25px; }
        .welcome-msg h1 { font-size: 1.8rem; font-weight: 800; }
        .welcome-msg p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

        /* --- Chat List (Placeholder) --- */
        .chat-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .chat-card:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }
        .chat-img { width: 50px; height: 50px; border-radius: 15px; margin-right: 15px; background: #1a1a1a; }
        .chat-info h3 { font-size: 1rem; margin-bottom: 4px; }
        .chat-info p { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

        /* --- Bottom Navigation --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(10,10,15,0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 18px; border-radius: 28px; border: 1px solid var(--border); z-index: 1000; }
        .nav-item { color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--primary); transform: scale(1.1); }
        .nav-item svg { width: 26px; height: 26px; }

        /* --- Action Loader --- */
        #main-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-loader"><div class="spinner"></div></div>

    <header class="header">
        <div class="logo">CHATUP</div>
        <img id="top-avatar" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" onclick="window.location.href='./profile.html'">
    </header>

    <main class="main-content">
        <div class="welcome-msg">
            <h1 id="user-welcome">Hi, User!</h1>
            <p>Ready to chat with your friends?</p>
        </div>

        <div id="chat-list">
            <div class="chat-card">
                <div class="chat-img"></div>
                <div class="chat-info">
                    <h3>Global Chat</h3>
                    <p>Welcome to ChatUp Community...</p>
                </div>
            </div>
            </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='./dashboard.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-item" onclick="window.location.href='./search.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
        <div class="nav-item" onclick="window.location.href='./profile.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch User Data from Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('user-welcome').innerText = `Hi, ${data.publicName || 'User'}!`;
                    if (data.profilePic) {
                        document.getElementById('top-avatar').src = data.profilePic;
                    }
                }
                document.getElementById('main-loader').style.display = 'none';
            } else {
                // Not logged in -> Redirect to Login
                window.location.replace('./login.html');
            }
        });
    </script>
</body>
</html>
