<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - ChatUp</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: white; min-height: 100vh; }

        /* Navbar Styling */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); letter-spacing: 1px; }

        .profile-nav-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary);
            cursor: pointer; overflow: hidden; transition: 0.3s;
        }
        .profile-nav-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* Profile Modal */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }

        .profile-card {
            background: #121218; border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 380px; margin: 80px auto; padding: 30px;
            border-radius: 28px; text-align: center; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #666; }

        /* Image Upload UI */
        .img-wrapper {
            position: relative; width: 110px; height: 110px; margin: 0 auto 15px;
            border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--primary), #4facfe);
        }
        #profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #121218; cursor: pointer; }
        .cam-badge {
            position: absolute; bottom: 5px; right: 5px; background: var(--primary);
            color: #000; width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px; border: 3px solid #121218;
        }

        .user-details h2 { color: #fff; margin-bottom: 5px; font-size: 1.4rem; }
        .user-details p { color: var(--primary); font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; }

        .info-box { text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .info-row { margin-bottom: 10px; }
        .info-row label { display: block; font-size: 10px; color: #666; text-transform: uppercase; font-weight: 700; }
        .info-row span { font-size: 15px; color: #eee; }

        .btn-logout {
            width: 100%; padding: 12px; background: rgba(255, 75, 43, 0.1); color: #ff4b2b;
            border: 1px solid #ff4b2b; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4b2b; color: white; }

        /* Main Content */
        .welcome-msg { padding: 40px 25px; text-align: center; }
        .welcome-msg h1 { font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CHAT UP</div>
        <div class="profile-nav-btn" onclick="openProfile()">
            <img id="nav-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
        </div>
    </nav>

    <div class="welcome-msg">
        <h1>Bhai, Swagat hai! 👋</h1>
        <p>Yahan teri saari chats dikhengi (Coming Soon).</p>
    </div>

    <div id="profile-modal" class="modal">
        <div class="profile-card">
            <span class="close-btn" onclick="closeProfile()">&times;</span>
            
            <div class="img-wrapper">
                <label for="file-upload" style="cursor: pointer;">
                    <img id="profile-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                    <div class="cam-badge">📷</div>
                </label>
                <input id="file-upload" type="file" accept="image/*" style="display:none;" onchange="uploadToCloudinary(event)">
            </div>

            <div class="user-details">
                <h2 id="u-name">Loading...</h2>
                <p id="u-handle">@username</p>
            </div>

            <div class="info-box">
                <div class="info-row">
                    <label>Email Address</label>
                    <span id="u-email">...</span>
                </div>
                <div class="info-row">
                    <label>Mobile Number</label>
                    <span id="u-mobile">...</span>
                </div>
            </div>

            <button class="btn-logout" onclick="logout()">Logout Account</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. Check Login & Load Data
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('u-name').innerText = data.publicName;
                    document.getElementById('u-handle').innerText = "@" + data.username;
                    document.getElementById('u-email').innerText = data.email;
                    document.getElementById('u-mobile').innerText = data.mobile;
                    
                    if(data.profilePic) {
                        document.getElementById('profile-pic').src = data.profilePic;
                        document.getElementById('nav-img').src = data.profilePic;
                    }
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        // 2. Cloudinary Upload Function
        window.uploadToCloudinary = async (event) => {
            const file = event.target.files[0];
            const user = auth.currentUser;
            if (!file || !user) return;

            // --- APNI DETAILS YAHAN DALO ---
            const cloudName = 'dic23ryy7'; 
            const uploadPreset = 'chatup preset'; // <--- YAHAN APNA PRESET NAME DALO

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            try {
                const btn = document.querySelector('.cam-badge');
                btn.innerText = "⏳"; // Loading sign

                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.secure_url) {
                    const photoLink = result.secure_url;

                    // Firestore update
                    await updateDoc(doc(db, "users", user.uid), {
                        profilePic: photoLink
                    });

                    // UI Update
                    document.getElementById('profile-pic').src = photoLink;
                    document.getElementById('nav-img').src = photoLink;
                    btn.innerText = "📷";
                    alert("Profile Photo Update Ho Gayi! ✅");
                } else {
                    alert("Upload Failed! Check if preset is 'Unsigned'.");
                    btn.innerText = "📷";
                }
            } catch (err) {
                console.error(err);
                alert("Internet ya Connection Error!");
            }
        };

        // Modal Controls
        window.openProfile = () => document.getElementById('profile-modal').style.display = 'block';
        window.closeProfile = () => document.getElementById('profile-modal').style.display = 'none';
        
        window.logout = () => {
            signOut(auth).then(() => { window.location.href = 'login.html'; });
        };
    </script>
</body>
</html>
