<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search - ChatUp</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; overflow-x: hidden; padding-bottom: 90px; }

        header {
            padding: 15px; display: flex; align-items: center; gap: 12px;
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .back-btn { background: none; border: none; color: white; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .back-btn:active { transform: scale(0.7); }

        .search-wrapper { flex: 1; position: relative; display: flex; align-items: center; }

        .search-input {
            width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 10px 15px 10px 40px; color: white; font-size: 0.9rem;
            outline: none; transition: 0.3s;
        }

        .search-input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); background: rgba(255,255,255,0.12); }

        .search-icon-inner { position: absolute; left: 12px; width: 18px; height: 18px; color: rgba(255,255,255,0.4); pointer-events: none; }

        .search-content { padding: 20px 15px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; display: none; } 
        .section-header h3 { font-size: 0.9rem; font-weight: 700; color: rgba(255,255,255,0.8); }
        .clear-btn { font-size: 0.75rem; color: var(--primary); font-weight: 600; cursor: pointer; }

        #recent-list { display: flex; flex-direction: column; }

        /* --- SHARED NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; padding: 12px 10px;
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        
        .nav-item { 
            color: rgba(255, 255, 255, 0.4); cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
        }

        .nav-item:active { transform: scale(0.7); color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; }
        
        .nav-item.active { 
            color: var(--primary); 
            transform: scale(1.1) translateY(-5px); 
            filter: drop-shadow(0 0 8px var(--primary)); 
        }

    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="location.href='dashboard.html'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="search-wrapper">
            <svg class="search-icon-inner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" placeholder="Search friends..." autofocus oninput="handleSearch(this.value)">
        </div>
    </header>

    <div class="search-content">
        <div id="recent-section">
            <div class="section-header" id="sec-header">
                <h3>Recent</h3>
                <span class="clear-btn" onclick="clearAll()">Clear all</span>
            </div>
            <div id="recent-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.href='dashboard.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-item active" onclick="location.href='search.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
        <div class="nav-item" onclick="location.href='notifications.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </div>
        <div class="nav-item" onclick="location.href='settings.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </div>
    </nav>

    <script>
        function checkEmpty() {
            const list = document.getElementById('recent-list');
            const header = document.getElementById('sec-header');
            if (list.children.length === 0) {
                header.style.display = 'none';
            } else {
                header.style.display = 'flex';
            }
        }

        function clearAll() {
            document.getElementById('recent-list').innerHTML = '';
            checkEmpty();
        }

        function handleSearch(val) {
            const section = document.getElementById('recent-section');
            if(val.length > 0) {
                section.style.display = 'none';
            } else {
                section.style.display = 'block';
                checkEmpty();
            }
        }

        window.onload = checkEmpty;
    </script>

</body>
</html>
