<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Premium Login</title>
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.05) 0px, transparent 50%);
            min-height: 100vh; /* Orientation fix */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
            transition: 0.5s ease;
            padding: 20px;
        }

        /* --- PREVIOUS PREMIUM LOADING LAYER --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #050508;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-ring {
            position: absolute;
            width: 220px; height: 220px;
            border: 2px solid transparent;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: rotate-ring 1.5s linear infinite;
        }

        .premium-ring:nth-child(2) {
            width: 190px; height: 190px;
            border-top: 2px solid var(--secondary);
            animation: rotate-ring 2s linear infinite reverse;
        }

        .splash-logo-text {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 10;
        }

        .percent-num {
            margin-top: 130px;
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 800;
            font-family: monospace;
            text-shadow: 0 0 10px var(--primary);
        }

        /* --- LOGIN CARD --- */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card.show { opacity: 1; transform: translateY(0) scale(1); }

        .brand-tag {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            animation: float-logo 4s ease-in-out infinite;
        }

        .input-group { margin-bottom: 25px; text-align: left; position: relative; }
        label { display: block; margin-left: 15px; margin-bottom: 8px; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; }

        .input-field {
            width: 100%; padding: 16px 20px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3); color: white; font-size: 16px; outline: none; transition: 0.4s;
        }

        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }

        /* PREVIOUS NEON EYE ICON */
        .eye-icon {
            position: absolute; right: 20px; bottom: 14px; cursor: pointer;
            color: var(--primary); filter: drop-shadow(0 0 5px var(--primary)); z-index: 5;
        }

        .btn-login {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: #050508; font-size: 1rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }

        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(79, 172, 254, 0.5); }

        .footer-link { margin-top: 25px; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
        .footer-link span { color: var(--primary); cursor: pointer; font-weight: 800; }

        @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float-logo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Orientation Fix for Small Screens */
        @media (max-height: 600px) {
            body { align-items: flex-start; padding-top: 40px; }
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-container">
            <div class="premium-ring"></div>
            <div class="premium-ring"></div>
            <div class="splash-logo-text">CHAT UP</div>
        </div>
        <div id="percent" class="percent-num">0%</div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="brand-tag">CHAT UP</div>
        <div class="input-group">
            <label>Login ID</label>
            <input type="text" id="userID" class="input-field" placeholder="Username or Mobile" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPass" class="input-field" placeholder="••••••••">
            <span class="eye-icon" id="togglePass">
                <svg id="eyeSvg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </span>
        </div>
        <button id="loginBtn" class="btn-login">Explore Now</button>
        <p class="footer-link">New to ChatUp? <span onclick="pageTransition('signup.html')">Join Now</span></p>
    </div>

    <script>
        function pageTransition(url) {
            document.body.style.opacity = "0";
            document.body.style.transform = "scale(0.95)";
            setTimeout(() => { window.location.href = url; }, 500);
        }

        window.onload = function() {
            let current = 0;
            let interval = setInterval(() => {
                current += Math.floor(Math.random() * 10) + 1;
                if (current >= 100) {
                    current = 100;
                    clearInterval(interval);
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.visibility = 'hidden';
                        document.getElementById('loginCard').classList.add('show');
                    }, 800);
                }
                document.getElementById('percent').innerText = current + "%";
            }, 100);
        };

        const togglePass = document.getElementById('togglePass');
        const passInput = document.getElementById('userPass');
        const eyeSvg = document.getElementById('eyeSvg');

        togglePass.addEventListener('click', () => {
            const isPass = passInput.getAttribute('type') === 'password';
            passInput.setAttribute('type', isPass ? 'text' : 'password');
            eyeSvg.innerHTML = isPass ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>' : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        });
    </script>
</body>
</html>
