<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Login</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .login-card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            padding: 40px 30px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 400px; 
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        p.subtitle { color: rgba(255,255,255,0.5); margin-bottom: 30px; font-size: 0.9rem; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 5px; font-weight: 700; margin-left: 10px; }
        input { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: #000; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.96); }

        .footer-link { margin-top: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 700; }

        #loader { display: none; margin-top: 15px; color: var(--primary); font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">CHATUP</div>
        <p class="subtitle">Log in to continue chatting</p>

        <div class="input-group">
            <label>EMAIL</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" id="loginBtn">Login Now</button>
        <div id="loader">Checking credentials...</div>

        <div class="footer-link">
            New here? <a href="./signup.html">Create an account</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const btn = document.getElementById('loginBtn');
        const loader = document.getElementById('loader');

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace('./dashboard.html');
            }
        });

        btn.onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(!email || !pass) return alert("Please fill all fields!");

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                // Redirect on success
                window.location.replace('./dashboard.html');
            } catch (err) {
                alert("Login Failed: " + err.message);
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
