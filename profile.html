<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatUp - Profile</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 100px; overflow-x: hidden; }

        /* --- 1. ACTION LOADER & CAMERA MODAL --- */
        #action-loader, #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; display: none; justify-content: center; align-items: center; }
        .loader-backdrop { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .loader-box, .camera-box { position: relative; background: var(--glass); padding: 30px; border-radius: 25px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; }
        
        #video-preview { width: 100%; border-radius: 15px; background: #000; margin-bottom: 15px; transform: scaleX(-1); }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- UI ELEMENTS --- */
        .clickable { transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .clickable:active { transform: scale(0.92); filter: brightness(1.2); }

        #profile-content { padding: 25px 20px; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .pic-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        #display-pic { width: 100%; height: 100%; border-radius: 50%; border: 3.5px solid var(--primary); padding: 4px; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
        #user-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .edit-badge { position: absolute; bottom: 5px; right: 5px; background: var(--primary); width: 32px; height: 32px; border-radius: 50%; color: #000; display: flex; justify-content: center; align-items: center; border: 3.5px solid var(--bg-dark); font-size: 14px; }

        .details-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 10px 20px; margin-bottom: 25px; backdrop-filter: blur(20px); }
        .info-row { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-row:last-child { border-bottom: none; }
        .label { font-size: 0.65rem; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .value { font-size: 1rem; font-weight: 500; }

        .action-btn { background: var(--primary); color: #000; padding: 16px; border-radius: 18px; text-align: center; font-weight: 800; font-size: 0.95rem; box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2); }

        /* --- MODAL (POPUP) --- */
        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { position: relative; width: 100%; max-width: 400px; background: #0c0c10; border: 1px solid var(--border); border-radius: 30px; padding: 30px; z-index: 5001; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 6px; font-weight: 600; }
        .input-group input, .input-group textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: white; outline: none; font-size: 1rem; }
        .modal-btns { display: flex; gap: 12px; margin-top: 10px; }
        .m-btn { flex: 1; padding: 14px; border-radius: 14px; text-align: center; font-weight: 800; }
        .save { background: var(--primary); color: #000; }
        .cancel { background: rgba(255,255,255,0.1); }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(10,10,15,0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 18px; border-radius: 28px; border: 1px solid var(--border); }
        .nav-item { color: rgba(255,255,255,0.3); }
        .nav-item.active { color: var(--primary); transform: scale(1.1); }
        .nav-item svg { width: 24px; height: 24px; }

        /* --- SHEET --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 2000; }
        .action-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #0c0c10; border-radius: 35px 35px 0 0; padding: 35px 25px; z-index: 2001; transition: 0.4s; border-top: 1px solid var(--border); }
        .action-sheet.active { bottom: 0; }
        .sheet-btn { padding: 18px; background: var(--glass); border-radius: 18px; margin-bottom: 12px; text-align: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="action-loader">
        <div class="loader-backdrop"></div>
        <div class="loader-box"><div class="spinner"></div><p id="loader-msg">Updating...</p></div>
    </div>

    <div id="camera-modal">
        <div class="loader-backdrop"></div>
        <div class="camera-box">
            <video id="video-preview" autoplay playsinline></video>
            <canvas id="photo-canvas" style="display:none;"></canvas>
            <div class="camera-btns" style="display:flex; gap:10px;">
                <div class="m-btn clickable" style="background:rgba(255,255,255,0.1);" onclick="closeCamera()">Cancel</div>
                <div class="m-btn clickable" style="background:var(--primary); color:#000;" onclick="takeSnapshot()">Capture</div>
            </div>
        </div>
    </div>

    <div id="edit-modal">
        <div class="loader-backdrop" onclick="closeEdit()"></div>
        <div class="modal-box">
            <h3 style="color: var(--primary); margin-bottom: 20px;">Edit Profile</h3>
            <div class="input-group">
                <label>PUBLIC NAME</label>
                <input type="text" id="edit-name">
            </div>
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="edit-user">
            </div>
            <div class="input-group">
                <label>BIO</label>
                <textarea id="edit-bio" rows="2"></textarea>
            </div>
            <div class="modal-btns">
                <div class="m-btn cancel clickable" onclick="closeEdit()">Cancel</div>
                <div class="m-btn save clickable" onclick="saveDetails()">Save Changes</div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div id="profile-content">
        <div class="profile-header">
            <div class="pic-wrapper clickable" onclick="toggleSheet(true)">
                <div id="display-pic">
                    <svg id="default-svg" viewBox="0 0 24 24" fill="currentColor" style="width:55px; color:rgba(255,255,255,0.1);"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <img id="user-photo" src="" style="display:none;">
                </div>
                <div class="edit-badge">📷</div>
            </div>
        </div>

        <div class="details-card">
            <div class="info-row"><p class="label">Public Name</p><p class="value" id="val-name">Public Name</p></div>
            <div class="info-row"><p class="label">Username</p><p class="value" id="val-user">@username</p></div>
            <div class="info-row"><p class="label">Bio</p><p class="value" id="val-bio">Chat Up With Your Friends</p></div>
        </div>

        <div class="action-btn clickable" onclick="openEdit()">Edit Profile Details</div>


<div class="action-btn clickable" onclick="location.href='dashboard.html'" 
     style="background: rgba(255,255,255,0.05); color: #fff; margin-top: 12px; border: 1px solid var(--border); box-shadow: none;">
    Back to Dashboard
</div>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item clickable" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item clickable"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
        <div class="nav-item active clickable"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleSheet(false)"></div>
    <div class="action-sheet" id="actionSheet">
        <div class="sheet-btn clickable" onclick="openCamera()">📸 Take Photo (Camera)</div>
        <div class="sheet-btn clickable" onclick="triggerFile()">🖼️ Choose from Gallery</div>
        <div class="sheet-btn clickable" style="color:#ff4b5c" onclick="removePic()">🗑️ Remove Photo</div>
    </div>

    <script>
        let stream = null;
        function showLoader(msg, s) {
            document.getElementById('loader-msg').innerText = msg;
            document.getElementById('action-loader').style.display = s ? 'flex' : 'none';
        }

        function toggleSheet(s) {
            const ash = document.getElementById('actionSheet');
            const ov = document.getElementById('overlay');
            if(s) { ov.style.display='block'; setTimeout(()=>ash.classList.add('active'),10); }
            else { ash.classList.remove('active'); setTimeout(()=>ov.style.display='none',400); }
        }

        // --- CAMERA LOGIC ---
        async function openCamera() {
            toggleSheet(false);
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video-preview');
                video.srcObject = stream;
                document.getElementById('camera-modal').style.display = 'flex';
            } catch (err) { alert("Camera Permission Required!"); }
        }

        function closeCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-modal').style.display = 'none';
        }

        function takeSnapshot() {
            const v = document.getElementById('video-preview');
            const c = document.getElementById('photo-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            ctx.translate(c.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0);
            document.getElementById('user-photo').src = c.toDataURL('image/jpeg');
            document.getElementById('user-photo').style.display = 'block';
            document.getElementById('default-svg').style.display = 'none';
            closeCamera();
            showLoader("Uploading...", true);
            setTimeout(() => showLoader("", false), 1000);
        }

        // --- EDIT LOGIC ---
        function openEdit() {
            const n = document.getElementById('edit-name');
            const u = document.getElementById('edit-user');
            const b = document.getElementById('edit-bio');
            n.value = document.getElementById('val-name').innerText;
            u.value = document.getElementById('val-user').innerText;
            b.value = document.getElementById('val-bio').innerText;
            document.getElementById('edit-modal').style.display = 'flex';
            n.select(); // Auto-select text
        }

        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }

        function saveDetails() {
            closeEdit();
            showLoader("Saving...", true);
            setTimeout(() => {
                document.getElementById('val-name').innerText = document.getElementById('edit-name').value;
                document.getElementById('val-user').innerText = document.getElementById('edit-user').value;
                document.getElementById('val-bio').innerText = document.getElementById('edit-bio').value;
                showLoader("", false);
            }, 1200);
        }

        function triggerFile() { toggleSheet(false); document.getElementById('fileInput').click(); }
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                showLoader("Processing...", true);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setTimeout(() => {
                        document.getElementById('user-photo').src = ev.target.result;
                        document.getElementById('user-photo').style.display = 'block';
                        document.getElementById('default-svg').style.display = 'none';
                        showLoader("", false);
                    }, 1000);
                };
                reader.readAsDataURL(file);
            }
        };

        function removePic() {
            toggleSheet(false);
            showLoader("Removing...", true);
            setTimeout(() => {
                document.getElementById('user-photo').style.display = 'none';
                document.getElementById('default-svg').style.display = 'block';
                showLoader("", false);
            }, 800);
        }
    </script>
</body>
</html>
