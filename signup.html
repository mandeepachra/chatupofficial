<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signup - ChatUp</title>
    <style>
        :root {
            --primary: #00f2fe;
            --bg-dark: #050508;
            --glass: rgba(255, 255, 255, 0.08);
            --error: #ff4b2b;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .signup-card {
            width: 100%; max-width: 400px; background: var(--glass);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(25px); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 25px; font-weight: 800; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        
        input {
            width: 100%; padding: 14px 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: white; outline: none; transition: 0.3s; font-size: 16px;
        }

        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--primary); display: flex; align-items: center;
        }

        #user-status { font-size: 0.7rem; margin-top: 4px; display: none; min-height: 15px; font-weight: 600; }

        .btn-primary {
            width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary), #4facfe);
            border: none; border-radius: 12px; color: #000; font-weight: 800;
            cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="signup-card">
        <h2>Join ChatUp</h2>
        
        <div class="input-group">
            <input type="text" id="public-name" placeholder="Public Name (Display Name)">
        </div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username (Unique)" 
            oninput="this.value = this.value.replace(/[^a-z0-9_]/g, ''); handleUsernameCheck(this.value)">
            <div id="user-status">Checking...</div>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
        </div>

        <div class="input-group">
            <input type="tel" id="mobile" placeholder="Mobile Number" maxlength="10" 
            oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Create Password">
            <div class="eye-icon" onclick="togglePass()">
                <svg id="eye-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
        </div>

        <button class="btn-primary" id="signup-btn" onclick="directSignup()">Create Account</button>

        <p style="margin-top: 20px; font-size: 0.85rem; opacity: 0.5;">Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Login</a></p>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let isUsernameValid = false;

        // --- 1. Toggle Password ---
        window.togglePass = () => {
            const passInput = document.getElementById('password');
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
        };

        // --- 2. Username Availability Check ---
        window.handleUsernameCheck = async (username) => {
            const status = document.getElementById('user-status');
            if(username.length < 3) { status.style.display='none'; isUsernameValid=false; return; }
            
            status.style.display = 'block'; 
            status.innerText = "Checking...";
            status.style.color = "#aaa";
            
            try {
                const q = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
                const snap = await getDocs(q);
                if(!snap.empty) { 
                    status.innerText = "Username taken ❌"; status.style.color = "#ff4b2b"; isUsernameValid=false; 
                } else { 
                    status.innerText = "Available ✅"; status.style.color = "#00ff88"; isUsernameValid=true; 
                }
            } catch (e) { console.error(e); }
        };

        // --- 3. Direct Signup Logic ---
        window.directSignup = async () => {
            const btn = document.getElementById('signup-btn');
            const pName = document.getElementById('public-name').value.trim();
            const uName = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const pass = document.getElementById('password').value;

            // Basic Validations
            if(!isUsernameValid) { alert("Please choose a unique username!"); return; }
            if(!pName || !email || mobile.length !== 10 || pass.length < 6) { 
                alert("Please fill all details correctly! (Password min 6 chars)"); 
                return; 
            }

            btn.disabled = true;
            btn.innerText = "Creating Account...";

            try {
                // Firebase Auth Create User
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // Save Extra Details to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    publicName: pName,
                    username: uName,
                    email: email,
                    mobile: mobile,
                    createdAt: new Date()
                });

                alert("Account created successfully!");
                location.href = 'dashboard.html';

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Create Account";
                alert("Error: " + error.message);
            }
        };

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') directSignup();
        });
    </script>
</body>
</html>
